server:
  port: 8888

spring:
  application:
    name: config-server
  cloud:
    config:
      allowOverride: true
      overrideNone: false
      overrideSystemProperties: true
      server:
        git:
          uri: https://github.com/SohelSheikh786/ecommerce-config-repo
          default-label: main
          clone-on-start: true
          search-paths: .

